<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 助手</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f6fa;
  --sidebar:   #ffffff;
  --card:      #ffffff;
  --border:    #eaecf0;
  --border2:   #f0f2f5;
  --text:      #1a1d23;
  --text2:     #6b7280;
  --text3:     #9ca3af;
  --primary:   #6366f1;
  --primary-l: #ede9fe;
  --green:     #10b981;
  --green-l:   #d1fae5;
  --amber:     #f59e0b;
  --amber-l:   #fef3c7;
  --red:       #ef4444;
  --red-l:     #fee2e2;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
  font-size: 14px;
}

/* ── scrollbar ── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

/* ════════════════════════════════════
   SIDEBAR
════════════════════════════════════ */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Logo */
.sidebar-logo {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}
.logo-name  { font-size: 15px; font-weight: 700; color: var(--text); }
.logo-sub   { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* Section labels */
.sec-label {
  padding: 14px 16px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  color: var(--text3);
  text-transform: uppercase;
}

/* ── 私人黑洞 ── */
.blackhole {
  padding: 0 12px 12px;
  flex-shrink: 0;
}

.upload-zone {
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  padding: 14px 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  background: var(--bg);
}
.upload-zone:hover { border-color: var(--primary); background: var(--primary-l); }
.upload-zone.drag  { border-color: var(--primary); background: var(--primary-l); }
.upload-zone .uz-icon { font-size: 22px; margin-bottom: 4px; }
.upload-zone .uz-text { font-size: 12px; color: var(--text2); }
.upload-zone .uz-sub  { font-size: 11px; color: var(--text3); margin-top: 2px; }
#fileInput { display: none; }

.doc-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
.doc-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text2);
}
.doc-item .doc-icon { color: var(--green); font-size: 13px; }
.doc-item .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.doc-item .doc-chunks { color: var(--text3); font-size: 11px; flex-shrink: 0; }

/* ── 近期对话 ── */
.recent {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.session-item {
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .12s;
  border: 1px solid transparent;
  display: flex; align-items: center; gap: 6px;
}
.session-item:hover  { background: var(--bg); }
.session-item.active { background: var(--primary-l); border-color: #c7d2fe; }
.sess-info  { flex: 1; min-width: 0; }
.sess-title { font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sess-meta  { font-size: 11px; color: var(--text3); margin-top: 2px; }
.sess-empty { font-size: 12px; color: var(--text3); padding: 8px 4px; }
.sess-del {
  flex-shrink: 0;
  width: 20px; height: 20px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--text3);
  opacity: 0;
  transition: opacity .15s, background .15s, color .15s;
}
.session-item:hover .sess-del { opacity: 1; }
.sess-del:hover { background: var(--red-l); color: var(--red); }

/* New chat button */
.new-chat-btn {
  margin: 0 12px 12px;
  padding: 8px;
  background: var(--primary-l);
  color: var(--primary);
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  width: calc(100% - 24px);
  transition: background .15s;
}
.new-chat-btn:hover { background: #ddd6fe; }

/* ════════════════════════════════════
   MAIN
════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg);
}

/* ── Controls bar ── */
.controls-bar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

/* RAG toggle */
.rag-toggle-wrap {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--card);
  cursor: pointer;
  user-select: none;
  transition: border-color .15s, background .15s;
}
.rag-toggle-wrap:hover { border-color: var(--green); }
.rag-toggle-wrap.on    { border-color: var(--green); background: var(--green-l); }
.toggle-pill {
  width: 28px; height: 16px;
  background: #d1d5db;
  border-radius: 8px;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.rag-toggle-wrap.on .toggle-pill { background: var(--green); }
.toggle-pill::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  background: #fff;
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: left .2s;
  box-shadow: 0 1px 2px rgba(0,0,0,.15);
}
.rag-toggle-wrap.on .toggle-pill::after { left: 14px; }
.toggle-label { font-size: 12px; font-weight: 600; color: var(--text2); }
.rag-toggle-wrap.on .toggle-label { color: var(--green); }

/* Tools button */
.tools-btn-wrap { position: relative; }
.tools-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--card);
  cursor: pointer;
  user-select: none;
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  transition: border-color .15s, background .15s;
}
.tools-btn:hover { border-color: var(--amber); }
.tools-btn.active { border-color: var(--amber); background: var(--amber-l); color: var(--amber); }
.tools-btn .tool-count {
  background: var(--amber);
  color: #fff;
  border-radius: 8px;
  padding: 0 5px;
  font-size: 10px;
  font-weight: 700;
  min-width: 16px;
  text-align: center;
}

/* Tool picker dropdown */
.tool-picker {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,.10);
  padding: 8px;
  min-width: 240px;
  z-index: 100;
  display: none;
}
.tool-picker.open { display: block; }
.picker-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; padding: 2px 6px 8px; }
.picker-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .12s;
}
.picker-item:hover { background: var(--bg); }
.picker-item input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--amber); cursor: pointer; flex-shrink: 0; }
.picker-item-icon { font-size: 16px; }
.picker-item-info .p-name { font-size: 12px; font-weight: 600; color: var(--text); }
.picker-item-info .p-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }
.picker-item-mcp { font-size: 9px; font-weight: 700; background: var(--amber-l); color: var(--amber); border-radius: 4px; padding: 1px 4px; margin-left: 4px; }

/* MCP add form */
.picker-divider { height: 1px; background: var(--border); margin: 6px 0; }
.mcp-add-btn {
  display: flex; align-items: center; gap: 6px;
  width: 100%; padding: 7px 10px;
  border: none; background: none;
  border-radius: 8px; cursor: pointer;
  font-size: 12px; font-weight: 600; color: var(--primary);
  transition: background .12s;
}
.mcp-add-btn:hover { background: var(--primary-l); }
.mcp-form { display: none; padding: 6px 4px 4px; flex-direction: column; gap: 6px; }
.mcp-form.open { display: flex; }
.mcp-input {
  width: 100%;
  padding: 5px 8px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  font-family: inherit;
}
.mcp-input:focus { border-color: var(--primary); }
.mcp-submit {
  padding: 5px 10px;
  background: var(--primary);
  color: #fff; border: none;
  border-radius: 7px; font-size: 12px; font-weight: 600;
  cursor: pointer; align-self: flex-end;
  transition: opacity .15s;
}
.mcp-submit:hover { opacity: .85; }

.controls-right { margin-left: auto; font-size: 12px; color: var(--text3); }

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* Welcome */
.welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; text-align: center; padding: 40px;
}
.welcome-emoji { font-size: 44px; margin-bottom: 14px; }
.welcome-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.welcome-desc  { font-size: 14px; color: var(--text2); line-height: 1.7; max-width: 380px; }

/* Message rows */
.msg-row { display: flex; gap: 10px; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; }

.avatar {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.avatar.ai   { background: linear-gradient(135deg, var(--primary), #818cf8); color: #fff; }
.avatar.user { background: linear-gradient(135deg, #374151, #6b7280); color: #fff; }

.msg-body { max-width: 68%; display: flex; flex-direction: column; gap: 4px; }
.msg-row.user .msg-body { align-items: flex-end; }

.msg-name { font-size: 11px; color: var(--text3); padding: 0 2px; }

.bubble {
  padding: 11px 15px;
  border-radius: 14px;
  line-height: 1.65;
  word-break: break-word;
}
.bubble.ai {
  background: var(--card);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--text);
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.bubble.user {
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  border-top-right-radius: 4px;
  box-shadow: 0 2px 10px rgba(99,102,241,.28);
}

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 4px 2px; align-items: center; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text3);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .18s; }
.typing span:nth-child(3) { animation-delay: .36s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); opacity: .6; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* ════════════════════════════════════
   THINKING PROCESS
════════════════════════════════════ */
.think-wrap {
  margin-bottom: 6px;
}

/* Collapsible header */
.think-header {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
  padding: 5px 0;
}
.think-icon {
  font-size: 13px;
  transition: transform .2s;
}
.think-header.open .think-icon { transform: rotate(90deg); }
.think-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: .3px;
}
.think-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 600;
}
.badge-react  { background: #ede9fe; color: #7c3aed; }
.badge-tool   { background: var(--amber-l); color: var(--amber); }
.badge-rag    { background: var(--green-l); color: var(--green); }
.badge-memory { background: #dbeafe; color: #3b82f6; }

/* Steps body */
.think-body {
  display: none;
  flex-direction: column;
  gap: 4px;
  margin-top: 6px;
  padding: 10px 12px;
  background: #fafbfc;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
}
.think-body.open { display: flex; }

/* Individual step */
.step-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  padding: 4px 0;
  border-bottom: 1px solid var(--border2);
}
.step-row:last-child { border-bottom: none; }
.step-type {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 6px;
  min-width: 58px;
  text-align: center;
  margin-top: 1px;
}
.step-thought     { background: #ede9fe; color: #7c3aed; }
.step-action      { background: var(--amber-l); color: #92400e; }
.step-observation { background: var(--green-l); color: #065f46; }
.step-final       { background: #dbeafe; color: #1d4ed8; }

.step-content { flex: 1; color: var(--text2); line-height: 1.5; word-break: break-all; }
.step-params  { margin-top: 3px; font-size: 11px; color: var(--text3); font-family: monospace; }

/* Tool call block */
.tool-call-block {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.tool-call-row {
  display: flex;
  gap: 6px;
  align-items: flex-start;
  font-size: 12px;
  line-height: 1.5;
}
.tool-call-label {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  min-width: 44px;
  padding-top: 1px;
}
.tool-call-val { color: var(--text2); word-break: break-all; }
.tool-call-result { color: var(--text); }

/* RAG sources */
.rag-sources { display: flex; flex-direction: column; gap: 5px; }
.rag-chunk {
  padding: 6px 10px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 11px;
  color: var(--text2);
  line-height: 1.5;
}
.rag-chunk .rag-chunk-score {
  font-size: 10px;
  color: var(--text3);
  float: right;
  margin-left: 8px;
}

/* Memory note */
.memory-note {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #3b82f6;
  background: #dbeafe;
  border-radius: 8px;
  padding: 5px 10px;
}

.answer-text {
  line-height: 1.65;
  white-space: pre-wrap;
}

/* ── Input area ── */
.input-area {
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 12px 20px 16px;
}
.input-row {
  display: flex; align-items: flex-end; gap: 8px;
}
.input-box {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  resize: none;
  min-height: 44px;
  max-height: 140px;
  line-height: 1.5;
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
  overflow-y: auto;
}
.input-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.1); background: #fff; }
.input-box::placeholder { color: var(--text3); }

.send-btn {
  width: 44px; height: 44px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary), #818cf8);
  border: none; border-radius: 10px;
  color: #fff; font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(99,102,241,.3);
  transition: opacity .15s, transform .1s;
}
.send-btn:hover   { opacity: .9; }
.send-btn:active  { transform: scale(.95); }
.send-btn:disabled { opacity: .4; cursor: default; }

.input-hint { margin-top: 7px; display: flex; gap: 8px; flex-wrap: wrap; }
.hint-chip {
  padding: 3px 10px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  transition: border-color .12s, color .12s;
  user-select: none;
}
.hint-chip:hover { border-color: var(--primary); color: var(--primary); }
</style>
</head>
<body>

<!-- ═══════════════ SIDEBAR ═══════════════ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">✦</div>
    <div>
      <div class="logo-name">AI 助手</div>
      <div class="logo-sub">Final Stage · 六合一</div>
    </div>
  </div>

  <!-- 私人黑洞 -->
  <div class="sec-label">私人黑洞</div>
  <div class="blackhole">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="uz-icon">🕳️</div>
      <div class="uz-text">上传个人文件</div>
      <div class="uz-sub">点击或拖拽到此处</div>
    </div>
    <input type="file" id="fileInput" accept=".txt,.md,.pdf" multiple>
    <div class="doc-list" id="docList"></div>
  </div>

  <!-- 近期对话 -->
  <div class="sec-label">近期对话</div>
  <div class="recent" id="sessionList">
    <div class="sess-empty">暂无对话记录</div>
  </div>

  <button class="new-chat-btn" onclick="newSession()">＋ 新建对话</button>
</aside>

<!-- ═══════════════ MAIN ═══════════════ -->
<div class="main">

  <!-- Controls -->
  <div class="controls-bar">
    <div class="rag-toggle-wrap" id="ragToggle" onclick="toggleRAG()">
      <div class="toggle-pill"></div>
      <span class="toggle-label">知识库</span>
    </div>

    <div class="tools-btn-wrap" id="toolsBtnWrap">
      <div class="tools-btn" id="toolsBtn" onclick="toggleToolPicker()">
        <span>🔧</span>
        <span>工具</span>
        <span class="tool-count" id="toolCount" style="display:none">0</span>
      </div>
      <div class="tool-picker" id="toolPicker">
        <div class="picker-title">选择工具（支持多选）</div>
        <div id="pickerItems"></div>
        <div class="picker-divider"></div>
        <button class="mcp-add-btn" onclick="toggleMCPForm()">＋ 接入 MCP 工具</button>
        <div class="mcp-form" id="mcpForm">
          <input class="mcp-input" id="mcpName"     placeholder="工具名称（英文，如 my_tool）">
          <input class="mcp-input" id="mcpDesc"     placeholder="工具描述">
          <input class="mcp-input" id="mcpEndpoint" placeholder="HTTP 端点（如 http://host/tool）">
          <button class="mcp-submit" onclick="submitMCPTool()">注册</button>
        </div>
      </div>
    </div>

    <div class="controls-right" id="modeHint">直接对话模式</div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-emoji">✦</div>
      <div class="welcome-title">你好，有什么我能帮你的？</div>
      <div class="welcome-desc">开启知识库可检索你上传的文件；选择工具后，我会自动推理并调用它们完成任务。</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea class="input-box" id="input" placeholder="输入消息，Enter 发送，Shift+Enter 换行…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
    </div>
    <div class="input-hint">
      <span class="hint-chip" onclick="qs('你是谁？')">你是谁</span>
      <span class="hint-chip" onclick="qs('现在几点？')">现在几点</span>
      <span class="hint-chip" onclick="qs('北京天气怎么样？')">北京天气</span>
      <span class="hint-chip" onclick="qs('我喜欢周杰伦的音乐')">记住偏好</span>
      <span class="hint-chip" onclick="qs('给我推荐一首歌')">音乐推荐</span>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
let ragOn = false;
let selectedTools = [];   // names of checked tools
let availableTools = [];  // [{name, desc}]
let sessions = JSON.parse(localStorage.getItem('ai_sessions') || '[]');
let currentId = null;
let uploadedDocs = JSON.parse(localStorage.getItem('ai_docs') || '[]');
let isLoading = false;

// ══════════════════════════════════════════
//  Session management
// ══════════════════════════════════════════
function newSession() {
  const id = Date.now().toString();
  sessions.unshift({ id, title: '新对话', messages: [], ts: Date.now() });
  if (sessions.length > 5) sessions = sessions.slice(0, 5);
  currentId = id;
  saveSessions();
  renderSessions();
  clearMessages();
}

function switchSession(id) {
  currentId = id;
  renderSessions();
  const sess = sessions.find(s => s.id === id);
  if (!sess) return;
  clearMessages();
  sess.messages.forEach(m => appendBubble(m.role, m.html, true));
}

function saveSessions() {
  localStorage.setItem('ai_sessions', JSON.stringify(sessions));
}

function curSession() {
  return sessions.find(s => s.id === currentId);
}

function pushMessage(role, html) {
  const sess = curSession();
  if (!sess) return;
  sess.messages.push({ role, html });
  if (sess.messages.length === 1 && role === 'user') {
    sess.title = html.replace(/<[^>]+>/g, '').slice(0, 20) || '新对话';
  }
  saveSessions();
  renderSessions();
}

function deleteSession(e, id) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  if (currentId === id) {
    currentId = sessions.length > 0 ? sessions[0].id : null;
    clearMessages();
    if (currentId) switchSession(currentId);
  }
  renderSessions();
}

function renderSessions() {
  const el = document.getElementById('sessionList');
  if (sessions.length === 0) {
    el.innerHTML = '<div class="sess-empty">暂无对话记录</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentId ? 'active' : ''}" onclick="switchSession('${s.id}')">
      <div class="sess-info">
        <div class="sess-title">${s.title}</div>
        <div class="sess-meta">${new Date(s.ts).toLocaleDateString('zh', {month:'short', day:'numeric'})}</div>
      </div>
      <div class="sess-del" onclick="deleteSession(event, '${s.id}')" title="删除">✕</div>
    </div>`).join('');
}

// ══════════════════════════════════════════
//  File upload  (私人黑洞)
// ══════════════════════════════════════════
document.getElementById('fileInput').addEventListener('change', async e => {
  for (const file of e.target.files) await uploadFile(file);
  e.target.value = '';
});

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', async e => {
  e.preventDefault(); zone.classList.remove('drag');
  for (const file of e.dataTransfer.files) await uploadFile(file);
});

async function uploadFile(file) {
  const text = await file.text();
  try {
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text })
    }).then(r => r.json());

    const doc = { name: file.name, chunks: res.chunk_count, ts: Date.now() };
    uploadedDocs = uploadedDocs.filter(d => d.name !== file.name);
    uploadedDocs.unshift(doc);
    localStorage.setItem('ai_docs', JSON.stringify(uploadedDocs));
    renderDocs();
  } catch(e) {
    console.error('上传失败', e);
  }
}

function renderDocs() {
  const el = document.getElementById('docList');
  el.innerHTML = uploadedDocs.slice(0, 6).map(d => `
    <div class="doc-item">
      <span class="doc-icon">✓</span>
      <span class="doc-name" title="${d.name}">${d.name}</span>
      <span class="doc-chunks">${d.chunks} 块</span>
    </div>`).join('');
}

// ══════════════════════════════════════════
//  RAG toggle
// ══════════════════════════════════════════
function toggleRAG() {
  ragOn = !ragOn;
  document.getElementById('ragToggle').classList.toggle('on', ragOn);
  updateModeHint();
}

// ══════════════════════════════════════════
//  Tool picker
// ══════════════════════════════════════════
async function loadTools() {
  try {
    availableTools = await fetch('/api/tools').then(r => r.json()) || [];
    renderPicker();
  } catch(e) {}
}

function renderPicker() {
  const toolIcons = { get_time: '🕐', get_weather: '🌤️', search_web: '🔍', rag_search: '🕳️' };
  document.getElementById('pickerItems').innerHTML = availableTools.map(t => `
    <label class="picker-item">
      <input type="checkbox" value="${t.name}" onchange="onToolCheck()" ${selectedTools.includes(t.name)?'checked':''}>
      <span class="picker-item-icon">${toolIcons[t.name] || '🔧'}</span>
      <div class="picker-item-info">
        <div class="p-name">${t.name}${t.is_mcp ? '<span class="picker-item-mcp">MCP</span>' : ''}</div>
        <div class="p-desc">${t.description || t.desc || ''}</div>
      </div>
    </label>`).join('');
}

function toggleMCPForm() {
  document.getElementById('mcpForm').classList.toggle('open');
}

async function submitMCPTool() {
  const name     = document.getElementById('mcpName').value.trim();
  const desc     = document.getElementById('mcpDesc').value.trim();
  const endpoint = document.getElementById('mcpEndpoint').value.trim();
  if (!name || !endpoint) { alert('工具名称和端点不能为空'); return; }
  try {
    const res = await fetch('/api/tools/mcp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description: desc, endpoint, params: [] })
    }).then(r => r.json());
    if (res.ok) {
      document.getElementById('mcpName').value = '';
      document.getElementById('mcpDesc').value = '';
      document.getElementById('mcpEndpoint').value = '';
      document.getElementById('mcpForm').classList.remove('open');
      await loadTools(); // 刷新工具列表
    }
  } catch(e) { alert('注册失败：' + e.message); }
}

function onToolCheck() {
  selectedTools = Array.from(document.querySelectorAll('#pickerItems input:checked')).map(c => c.value);
  const btn   = document.getElementById('toolsBtn');
  const count = document.getElementById('toolCount');
  btn.classList.toggle('active', selectedTools.length > 0);
  if (selectedTools.length > 0) {
    count.textContent = selectedTools.length;
    count.style.display = 'inline-block';
  } else {
    count.style.display = 'none';
  }
  updateModeHint();
}

function toggleToolPicker() {
  document.getElementById('toolPicker').classList.toggle('open');
}

// Close picker on outside click
document.addEventListener('click', e => {
  const wrap = document.getElementById('toolsBtnWrap');
  if (!wrap.contains(e.target)) document.getElementById('toolPicker').classList.remove('open');
});

function updateModeHint() {
  const el = document.getElementById('modeHint');
  if (selectedTools.length > 0) {
    el.textContent = `工具模式 · ${selectedTools.join(', ')}`;
    el.style.color = 'var(--amber)';
  } else if (ragOn) {
    el.textContent = '知识库增强模式';
    el.style.color = 'var(--green)';
  } else {
    el.textContent = '直接对话模式';
    el.style.color = 'var(--text3)';
  }
}

// ══════════════════════════════════════════
//  Messages
// ══════════════════════════════════════════
function clearMessages() {
  const el = document.getElementById('messages');
  el.innerHTML = '<div class="welcome" id="welcome"><div class="welcome-emoji">✦</div><div class="welcome-title">你好，有什么我能帮你的？</div><div class="welcome-desc">开启知识库可检索你上传的文件；选择工具后，我会自动推理并调用它们完成任务。</div></div>';
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendBubble(role, html, isHtml = false) {
  hideWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'msg-row ' + role;
  const name = role === 'user' ? '你' : 'AI';
  const initial = role === 'user' ? '你' : 'AI';
  wrap.innerHTML = `
    <div class="avatar ${role}">${initial}</div>
    <div class="msg-body">
      <div class="msg-name">${name}</div>
      <div class="bubble ${role}">${isHtml ? html : escHtml(html)}</div>
    </div>`;
  document.getElementById('messages').appendChild(wrap);
  document.getElementById('messages').scrollTop = 999999;
  return wrap;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ══════════════════════════════════════════
//  Build reply HTML — renders thinking process
// ══════════════════════════════════════════
function buildReply(data) {
  const parts = [];

  // ── 偏好提取通知 ──
  if (data.extracted_info) {
    parts.push(`<div class="memory-note">💾 ${escHtml(data.extracted_info)}</div>`);
  }

  // ── 思考过程 (ReAct / Tool / RAG) ──
  const hasSteps   = data.steps  && data.steps.length > 0;
  const hasTool    = data.tool_call && data.tool_call.tool_name;
  const hasRAG     = data.search_results && data.search_results.length > 0;
  const mode       = data.mode || 'chat';

  if (hasSteps || hasTool || hasRAG) {
    const badgeClass = { react:'badge-react', tool:'badge-tool', rag:'badge-rag', memory:'badge-memory' }[mode] || '';
    const badgeText  = { react:'ReAct 推理', tool:'工具调用', rag:'知识检索', memory:'记忆增强' }[mode] || mode;
    const thinkId    = 'think_' + Date.now();

    let bodyHtml = '';

    // ReAct steps
    if (hasSteps) {
      const typeMap = {
        'Thought':      ['step-thought',     '💭 思考'],
        'Action':       ['step-action',       '⚡ 动作'],
        'Observation':  ['step-observation',  '👁 观察'],
        'Final Answer': ['step-final',        '✅ 汇总'],
      };
      for (const s of data.steps) {
        const [cls, label] = typeMap[s.type] || ['step-thought', s.type];
        let paramsHtml = '';
        if (s.params && Object.keys(s.params).length > 0) {
          paramsHtml = `<div class="step-params">${escHtml(JSON.stringify(s.params))}</div>`;
        }
        bodyHtml += `
          <div class="step-row">
            <span class="step-type ${cls}">${label}</span>
            <div class="step-content">${escHtml(s.content)}${paramsHtml}</div>
          </div>`;
      }
    }

    // Single tool call
    if (hasTool && !hasSteps) {
      const tc = data.tool_call;
      const paramsStr = tc.params ? JSON.stringify(tc.params) : '{}';
      bodyHtml += `<div class="tool-call-block">
        <div class="tool-call-row"><span class="tool-call-label">工具</span><span class="tool-call-val">${escHtml(tc.tool_name)}</span></div>
        <div class="tool-call-row"><span class="tool-call-label">参数</span><span class="tool-call-val" style="font-family:monospace">${escHtml(paramsStr)}</span></div>
        <div class="tool-call-row"><span class="tool-call-label">结果</span><span class="tool-call-val tool-call-result">${escHtml(tc.tool_result || '')}</span></div>
      </div>`;
    }

    // RAG sources
    if (hasRAG) {
      bodyHtml += `<div class="rag-sources">`;
      for (const r of data.search_results.slice(0, 3)) {
        const score = (r.similarity * 100).toFixed(1);
        const preview = (r.chunk && r.chunk.content) ? r.chunk.content.slice(0, 120) : '';
        bodyHtml += `<div class="rag-chunk"><span class="rag-chunk-score">相关度 ${score}%</span>${escHtml(preview)}${preview.length >= 120 ? '…' : ''}</div>`;
      }
      bodyHtml += `</div>`;
    }

    parts.push(`
      <div class="think-wrap">
        <div class="think-header" id="${thinkId}_hdr" onclick="toggleThink('${thinkId}')">
          <span class="think-icon">▶</span>
          <span class="think-label">思考过程</span>
          <span class="think-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="think-body" id="${thinkId}_body">${bodyHtml}</div>
      </div>`);
  }

  // ── 最终回答 ──
  parts.push(`<div class="answer-text">${escHtml(data.answer || '')}</div>`);

  return parts.join('');
}

function toggleThink(id) {
  const hdr  = document.getElementById(id + '_hdr');
  const body = document.getElementById(id + '_body');
  const open = body.classList.toggle('open');
  hdr.classList.toggle('open', open);
}

// ══════════════════════════════════════════
//  Send
// ══════════════════════════════════════════
async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg || isLoading) return;

  if (!currentId) newSession();

  const userHtml = escHtml(msg);
  appendBubble('user', msg);
  pushMessage('user', userHtml);
  input.value = ''; autoResize(input);

  // typing indicator
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  const typingRow = appendBubble('ai', '<div class="typing"><span></span><span></span><span></span></div>', true);

  try {
    const body = {
      message: msg,
      use_rag: ragOn,
      selected_tools: selectedTools,
      explicit: true
    };
    const data = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(r => r.json());

    typingRow.remove();
    const replyHtml = buildReply(data);
    const msgEl = appendBubble('ai', replyHtml, true);
    // 只要有工具参与（tool list 非空），自动展开思考过程
    if (selectedTools.length > 0 || data.mode === 'react' || data.mode === 'tool' || data.mode === 'rag') {
      const body = msgEl.querySelector('.think-body');
      const hdr  = msgEl.querySelector('.think-header');
      if (body) body.classList.add('open');
      if (hdr)  hdr.classList.add('open');
    }
    pushMessage('ai', replyHtml);
  } catch(e) {
    typingRow.remove();
    const err = '❌ 请求失败，请检查服务是否正常运行。';
    appendBubble('ai', err);
    pushMessage('ai', err);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function qs(msg) {
  document.getElementById('input').value = msg;
  send();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ══════════════════════════════════════════
//  Init
// ══════════════════════════════════════════
renderSessions();
renderDocs();
loadTools();
if (sessions.length > 0) {
  // don't auto-switch, just show sessions in sidebar
}
</script>
</body>
</html>
